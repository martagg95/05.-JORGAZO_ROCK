name: Publish Comment

on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'aprobado'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;
            
            const nameMatch = body.match(/Nombre:\s*(.+)/i);
            const textMatch = body.match(/Comentario:\s*(.+)/is);
            
            const name = nameMatch ? nameMatch[1].trim() : "Anónimo";
            const text = textMatch ? textMatch[1].trim() : "";
            
            const dateObj = new Date();
            const date = dateObj.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
            
            let data = [];
            try {
              data = JSON.parse(fs.readFileSync('data/comments.json', 'utf8'));
            } catch (e) {
              data = [];
            }
            
            data.push({ name, text, date });
            fs.writeFileSync('data/comments.json', JSON.stringify(data, null, 2));

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: publish approved comment from issue #${{ github.event.issue.number }}"
          file_pattern: "data/comments.json"
          branch: feb2026

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "¡Publicado en la web! 🤘"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
